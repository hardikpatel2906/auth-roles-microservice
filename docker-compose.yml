version: '3.8'

services:
  # ── Node.js App ──────────────────────────
  app:
    build: .
    container_name: auth_app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DB_HOST: postgres      # overrides .env — points to container
      REDIS_HOST: redis      # overrides .env — points to container
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations then start app
    command: sh -c "npx sequelize-cli db:migrate && node app.js"
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: